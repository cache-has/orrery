# Orrery — Dashboard Diff on Pull Request
#
# Copy this file to .github/workflows/diff.yml in your dashboard project.
# Compares dashboards between the PR branch and main, and posts a structured
# diff comment showing what changed (new/removed dashboards, query changes,
# layout changes, parameter changes).

name: Dashboard Diff
on:
  pull_request:
    paths:
      - "dashboards/**"

permissions:
  pull-requests: write

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate diff report
        run: npx orrery diff --base origin/main --head HEAD --output ./diff-report.md
      - name: Comment diff on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diffPath = './diff-report.md';
            if (!fs.existsSync(diffPath)) {
              console.log('No diff report generated');
              return;
            }
            const diff = fs.readFileSync(diffPath, 'utf8');
            if (diff.trim().length === 0) {
              console.log('No dashboard changes detected');
              return;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: diff
            });
