# Orrery — Scheduled Dashboard Data Refresh
#
# Copy this file to .github/workflows/refresh.yml in your dashboard project.
# Rebuilds static dashboards on a schedule to keep data fresh.
#
# Customize the cron schedule below. Default: every 6 hours.
# Cron syntax: minute hour day-of-month month day-of-week
#   '0 */6 * * *'  — every 6 hours
#   '0 8 * * *'    — daily at 8 AM UTC
#   '0 */1 * * *'  — every hour
#
# Requires the same GitHub Secrets as deploy.yml.

name: Refresh Dashboards
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build with fresh data
        run: npx orrery build --output ./dist
        env:
          WAREHOUSE_HOST: ${{ secrets.WAREHOUSE_HOST }}
          WAREHOUSE_USER: ${{ secrets.WAREHOUSE_USER }}
          WAREHOUSE_PASSWORD: ${{ secrets.WAREHOUSE_PASSWORD }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
