name: CI

on: [push, pull_request]

# Least-privilege default for the GITHUB_TOKEN. CI only needs to read the repo.
# Pull requests from forks already run with a read-only token and no access to
# secrets; this makes that explicit and applies to push events as well.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
